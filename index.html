<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEN</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Press+Start+2P&family=Ma+Shan+Zheng&family=Noto+Sans+Devanagari:wght@400;700&family=Crimson+Pro:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red-main: #8B0000;
  --red-bright: #DC143C;
  --red-neon: #FF1744;
  --red-deep: #4A0000;
  --green-neon: #39FF14;
  --green-dark: #00C853;
  --black-main: #0A0A0A;
  --black-soft: #1A1A1A;
  --white-cream: #F5E6D3;
  --gold-accent: #FFD700;
  --gold-dim: #B8860B;
  --font-serif: 'Noto Serif KR', 'Crimson Pro', 'Ma Shan Zheng', serif;
  --font-sans: 'Noto Sans KR', sans-serif;
  --font-pixel: 'Press Start 2P', monospace;
  --font-cyber: 'Orbitron', sans-serif;
  --font-devanagari: 'Noto Sans Devanagari', sans-serif;
  --font-cn: 'Ma Shan Zheng', serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--black-main);font-family:var(--font-sans);-webkit-tap-highlight-color:transparent;user-select:none;}

/* Noise overlay */
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}

.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}

/* Oriental cross pattern - enhanced */
.oriental-bg{
  background-image:
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%238B0000' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
    radial-gradient(ellipse at 20% 80%, rgba(139,0,0,0.08), transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(57,255,20,0.03), transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(74,0,0,0.15), transparent 70%);
  background-color: var(--black-main);
}

/* Scanlines */
.scanlines::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,0.12) 1px,rgba(0,0,0,0.12) 2px);pointer-events:none;z-index:10;}

/* ====== TEXT BOX (Visual Novel) - ENHANCED ====== */
.text-box{
  position:absolute;bottom:6%;left:4%;right:4%;
  background:linear-gradient(135deg,rgba(10,10,10,0.95),rgba(74,0,0,0.85));
  border:1px solid rgba(220,20,60,0.5);
  border-radius:2px;
  padding:18px 22px;
  z-index:20;
  cursor:pointer;
  min-height:100px;
  /* Decorative corners via pseudo-elements on inner wrapper */
  box-shadow:
    0 0 20px rgba(220,20,60,0.2),
    0 0 60px rgba(220,20,60,0.05),
    inset 0 0 40px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(220,20,60,0.15);
}
.text-box::before{
  content:'';position:absolute;top:-1px;left:20px;width:60px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-accent),transparent);
  opacity:0.5;
}
.text-box::after{
  content:'';position:absolute;bottom:-1px;right:20px;width:60px;height:1px;
  background:linear-gradient(90deg,transparent,var(--green-neon),transparent);
  opacity:0.3;
}
.text-box .speaker{
  font-family:var(--font-serif);color:var(--red-neon);font-size:13px;font-weight:700;
  margin-bottom:8px;letter-spacing:3px;
  text-shadow:0 0 10px rgba(255,23,68,0.5);
  padding-left:2px;
  border-left:2px solid var(--gold-accent);
  padding-left:10px;
}
.text-box .dialogue{font-family:var(--font-sans);color:var(--white-cream);font-size:14.5px;line-height:1.8;letter-spacing:0.3px;}
.text-box .tap-ind{position:absolute;bottom:8px;right:14px;color:var(--green-neon);font-size:9px;animation:blink 1s infinite;text-shadow:0 0 6px var(--green-neon);}

/* Text box decorative corners */
.text-box-corner{position:absolute;width:14px;height:14px;z-index:21;pointer-events:none;}
.text-box-corner.tl{top:4px;left:4px;border-top:1px solid var(--gold-accent);border-left:1px solid var(--gold-accent);opacity:0.5;}
.text-box-corner.tr{top:4px;right:4px;border-top:1px solid var(--gold-accent);border-right:1px solid var(--gold-accent);opacity:0.5;}
.text-box-corner.bl{bottom:4px;left:4px;border-bottom:1px solid var(--gold-accent);border-left:1px solid var(--gold-accent);opacity:0.5;}
.text-box-corner.br{bottom:4px;right:4px;border-bottom:1px solid var(--gold-accent);border-right:1px solid var(--gold-accent);opacity:0.5;}

/* ====== PAUSE ====== */
#pause-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center;flex-direction:column;gap:16px;}
#pause-overlay.active{display:flex;}
.pause-btn{
  font-family:var(--font-serif);color:var(--white-cream);
  background:linear-gradient(135deg,rgba(74,0,0,0.9),rgba(139,0,0,0.7));
  border:1px solid rgba(220,20,60,0.4);
  padding:14px 40px;font-size:15px;cursor:pointer;letter-spacing:4px;
  transition:all .3s;
  position:relative;
  min-width:220px;text-align:center;
}
.pause-btn::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,transparent 40%,rgba(57,255,20,0.03) 50%,transparent 60%);pointer-events:none;}
.pause-btn:active{background:linear-gradient(135deg,var(--red-main),var(--red-bright));box-shadow:0 0 20px rgba(220,20,60,0.5);}
.pause-icon{
  position:absolute;top:16px;left:16px;
  color:var(--white-cream);font-size:18px;cursor:pointer;z-index:50;
  opacity:0.5;text-shadow:0 0 5px var(--green-neon);
  font-family:var(--font-cyber);
  width:36px;height:36px;
  display:flex;justify-content:center;align-items:center;
  background:rgba(10,10,10,0.5);
  border:1px solid rgba(139,0,0,0.3);
  border-radius:2px;
  transition:opacity .3s;
}
.pause-icon:active{opacity:1;}

/* ====== KEYFRAMES ====== */
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes dropBall{0%{top:-60px;opacity:0;}60%{opacity:1;}100%{top:80%;opacity:1;}}
@keyframes rippleRed{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.9;}
  100%{transform:translate(-50%,-50%) scale(6);opacity:0;}
}
@keyframes lotusBloom{0%{transform:scale(0) rotate(-30deg);opacity:0;}50%{transform:scale(.8) rotate(10deg);opacity:.8;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes neonPulse{0%,100%{opacity:.4;text-shadow:0 0 5px var(--green-neon);}50%{opacity:1;text-shadow:0 0 20px var(--green-neon),0 0 40px var(--green-neon);}}
@keyframes glitch{0%{transform:translate(0);}20%{transform:translate(-3px,2px);}40%{transform:translate(3px,-2px);}60%{transform:translate(-2px,-1px);}80%{transform:translate(2px,1px);}100%{transform:translate(0);}}
@keyframes glitchColor{0%{text-shadow:2px 0 #f00,-2px 0 #0f0;}50%{text-shadow:-2px 0 #f00,2px 0 #00f;}100%{text-shadow:2px 0 #f00,-2px 0 #0f0;}}
@keyframes marbling{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes slideFromRight{0%{transform:translateX(100vw);opacity:0;}100%{transform:translateX(-50%);opacity:1;}}
@keyframes slideFromLeft{0%{transform:translateX(-100vw);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@keyframes chakraBloom{0%{transform:scale(0) rotate(0deg);opacity:0;}100%{transform:scale(1) rotate(180deg);opacity:.6;}}
@keyframes calendarDrop{0%{transform:translateY(0) rotateX(0deg);opacity:1;}100%{transform:translateY(120%) rotateX(-90deg);opacity:0;}}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(30px);}100%{opacity:1;transform:translateY(0);}}
@keyframes shatter{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.05);}100%{transform:scale(0) rotate(45deg);opacity:0;}}
@keyframes petalFloat{0%{transform:translate(0,0) rotate(0deg);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot));opacity:0;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes specialGlitch {
  0%, 33% { opacity: 0; }
  33.1%, 36% { opacity: 1; }
  36.1%, 56% { opacity: 0; }
  56.1%, 66% { opacity: 1; }
  66.1%, 70% { opacity: 0; }
  70.1%, 100% { opacity: 1; }
}
@keyframes charGlow{0%{filter:drop-shadow(0 0 15px rgba(220,20,60,.2)) drop-shadow(0 0 5px rgba(57,255,20,.1));}100%{filter:drop-shadow(0 0 25px rgba(220,20,60,.4)) drop-shadow(0 0 10px rgba(57,255,20,.2));}}
@keyframes glitchLineMove{0%{transform:translateY(-100vh);}100%{transform:translateY(100vh);}}
@keyframes musicBarAnim{0%{height:4px;}100%{height:20px;}}
@keyframes floatParticle{0%{opacity:0;transform:translateY(0);}10%{opacity:1;}90%{opacity:1;}100%{opacity:0;transform:translateY(-100vh);}}
@keyframes fadeInCenter{0%{opacity:0;transform:translate(-50%,-50%) scale(0.9);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes borderGlow{
  0%,100%{border-color:rgba(220,20,60,0.3);box-shadow:0 0 10px rgba(220,20,60,0.1);}
  50%{border-color:rgba(220,20,60,0.6);box-shadow:0 0 20px rgba(220,20,60,0.2),0 0 40px rgba(220,20,60,0.05);}
}
@keyframes subtlePulse{0%,100%{opacity:0.6;}50%{opacity:1;}}

/* ====== [1] MAIN SCREEN - REDESIGNED ====== */
#main-screen{
  background:radial-gradient(ellipse at center 20%,rgba(74,0,0,0.4) 0%,transparent 50%),
             radial-gradient(ellipse at center bottom,#1a0000 0%,#0a0a0a 60%,#000 100%);
  justify-content:center;align-items:center;position:relative;
}
/* Water surface at bottom */
#main-screen .water-surface{
  position:absolute;bottom:0;left:0;right:0;height:25%;
  background:linear-gradient(180deg,transparent 0%,rgba(139,0,0,.05) 30%,rgba(139,0,0,.08) 60%,rgba(74,0,0,.12) 100%);
  overflow:hidden;
}
/* Ripple ring for red ripples */
.ripple-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(220,20,60,.4);
  pointer-events:none;
}
/* Drop circle */
#drop-circle{
  width:36px;height:36px;border-radius:50%;
  background:radial-gradient(circle,var(--red-neon),var(--red-deep));
  position:absolute;left:50%;transform:translateX(-50%);top:-60px;
  box-shadow:0 0 20px var(--red-neon),0 0 40px rgba(220,20,60,.3),0 0 60px rgba(220,20,60,.1);
  z-index:5;
}
/* Lotus container - TRUE CENTER */
#lotus-container{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;
}
/* Lotus - outline only redesign */
.lotus{width:100px;height:55px;position:relative;margin:0 auto 16px;}
.lotus-petal{
  position:absolute;width:24px;height:42px;
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  bottom:0;left:50%;transform-origin:bottom center;
  background:transparent !important;
  border:1px solid;
}
.lotus-petal:nth-child(1){border-color:rgba(220,20,60,0.7);transform:translateX(-50%) rotate(-40deg);}
.lotus-petal:nth-child(2){border-color:rgba(255,23,68,0.6);transform:translateX(-50%) rotate(-20deg);}
.lotus-petal:nth-child(3){border-color:rgba(255,23,68,0.8);transform:translateX(-50%) rotate(0deg);}
.lotus-petal:nth-child(4){border-color:rgba(255,23,68,0.6);transform:translateX(-50%) rotate(20deg);}
.lotus-petal:nth-child(5){border-color:rgba(220,20,60,0.7);transform:translateX(-50%) rotate(40deg);}
.lotus-petal:nth-child(6){border-color:rgba(139,0,0,0.5);transform:translateX(-50%) rotate(-30deg);width:20px;height:34px;}
.lotus-petal:nth-child(7){border-color:rgba(139,0,0,0.5);transform:translateX(-50%) rotate(30deg);width:20px;height:34px;}

#start-btn{
  font-family:var(--font-serif);font-size:16px;color:var(--white-cream);
  background:transparent;
  border:1px solid rgba(220,20,60,0.5);
  padding:12px 48px;cursor:pointer;letter-spacing:10px;
  position:relative;overflow:hidden;transition:all .4s;
  margin-top:8px;
}
#start-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(220,20,60,.2),transparent);transition:left .6s;}
#start-btn:active::before{left:100%;}
#start-btn:active{background:rgba(139,0,0,.3);box-shadow:0 0 25px rgba(220,20,60,.4);}

/* ====== KARMA DISPLAY - ENHANCED ====== */
.karma-display{
  width:260px;height:140px;
  border:1px solid rgba(220,20,60,0.5);
  background:linear-gradient(135deg,rgba(10,10,10,0.97),rgba(26,0,0,0.95));
  position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;
  box-shadow:0 0 30px rgba(220,20,60,.2),0 0 60px rgba(220,20,60,.05),inset 0 0 30px rgba(0,0,0,.8);
  overflow:hidden;
  animation:borderGlow 3s ease-in-out infinite;
}
.karma-display::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(220,20,60,0.03) 0%,transparent 30%,transparent 70%,rgba(57,255,20,0.02) 100%);pointer-events:none;}
.karma-corner{position:absolute;width:18px;height:18px;border-color:var(--gold-accent);opacity:.4;}
.karma-corner.tl{top:6px;left:6px;border-top:1px solid;border-left:1px solid;}
.karma-corner.tr{top:6px;right:6px;border-top:1px solid;border-right:1px solid;}
.karma-corner.bl{bottom:6px;left:6px;border-bottom:1px solid;border-left:1px solid;}
.karma-corner.br{bottom:6px;right:6px;border-bottom:1px solid;border-right:1px solid;}
.karma-label{font-family:var(--font-cyber);font-size:12px;color:var(--green-neon);letter-spacing:8px;animation:neonPulse 2s ease-in-out infinite;}
.karma-value{font-family:var(--font-cyber);font-size:34px;color:var(--red-neon);text-shadow:0 0 10px var(--red-neon),0 0 30px rgba(255,23,68,.4);margin-top:8px;}
.karma-unit{font-family:var(--font-serif);font-size:15px;color:var(--white-cream);opacity:.6;margin-left:4px;}

/* ====== CHARACTER STANDING - FIX IMAGE CLIPPING ====== */
.character-standing{
  position:absolute;right:0;top:0;height:100%;width:55%;
  object-fit:contain;
  object-position:right bottom;
  z-index:5;transition:opacity 1s ease;
}
/* Story BG - contain, no clipping */
.story-bg{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background-size:cover;background-position:center;
  z-index:1;transition:all 1s ease;
}

/* Flicker/Glitch overlay */
.flicker-overlay {
  position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:10;pointer-events:none;opacity:0;
  animation:specialGlitch 6s forwards;
}
.glitch-filter {
  filter:saturate(0.3) hue-rotate(-10deg) contrast(2.0) brightness(0.9) sepia(0.1);
}

/* Day14 marbling */
.marbling-bg{background:radial-gradient(ellipse at 30% 50%,rgba(139,0,0,.6),transparent 50%),radial-gradient(ellipse at 70% 30%,rgba(255,255,255,.15),transparent 40%),radial-gradient(ellipse at 50% 80%,rgba(139,0,0,.4),transparent 50%),linear-gradient(135deg,#0a0000,#1a0000,#0a0a0a,#200000);background-size:200% 200%;animation:marbling 8s ease-in-out infinite;}

/* Top text box - enhanced */
.top-text-box{
  position:absolute;top:5%;left:8%;right:8%;
  background:rgba(10,10,10,0.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(220,20,60,0.2);
  padding:18px 24px;z-index:20;cursor:pointer;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}
.top-text-box::before{content:'';position:absolute;top:-1px;left:30%;right:30%;height:1px;background:linear-gradient(90deg,transparent,rgba(220,20,60,0.4),transparent);}
.top-text-box .dialogue{font-family:var(--font-sans);color:var(--white-cream);font-size:14px;line-height:1.8;text-align:center;letter-spacing:0.5px;}

/* Calendar - enhanced */
.calendar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:200;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.calendar-page{
  width:200px;height:240px;
  background:linear-gradient(180deg,#f5e6d3,#e8d5c0);
  border:2px solid #8B0000;
  display:flex;justify-content:center;align-items:center;
  font-family:var(--font-cn);font-size:48px;color:var(--red-deep);
  position:relative;
  box-shadow:0 4px 30px rgba(139,0,0,.3),0 0 60px rgba(0,0,0,.5),inset 0 0 30px rgba(139,0,0,.08);
  text-align:center;line-height:1.2;padding:20px;
}
.calendar-page::before{content:'';position:absolute;top:10px;left:10px;right:10px;height:1px;background:linear-gradient(90deg,transparent,var(--red-main),transparent);}
.calendar-page::after{content:'';position:absolute;bottom:10px;left:10px;right:10px;height:1px;background:linear-gradient(90deg,transparent,var(--red-main),transparent);opacity:0.5;}

/* ====== CHOICE SCREEN - ENHANCED ====== */
#choice-screen{
  background:
    radial-gradient(ellipse at 50% 30%,rgba(74,0,0,0.4),transparent 60%),
    radial-gradient(ellipse at 20% 80%,rgba(139,0,0,0.15),transparent 40%),
    radial-gradient(ellipse at 80% 80%,rgba(57,255,20,0.03),transparent 30%),
    var(--black-main);
  justify-content:center;align-items:center;gap:40px;
}
.choice-title{
  font-family:var(--font-serif);font-size:19px;color:var(--red-bright);
  letter-spacing:5px;
  text-shadow:0 0 20px rgba(220,20,60,.4);
  animation:subtlePulse 3s ease-in-out infinite;
  text-align:center;padding:0 20px;line-height:1.8;
}
.choice-btn{
  font-family:var(--font-serif);font-size:17px;color:var(--white-cream);
  background:linear-gradient(135deg,rgba(74,0,0,0.8),rgba(139,0,0,0.4));
  border:1px solid rgba(220,20,60,0.4);
  padding:16px 52px;cursor:pointer;letter-spacing:5px;
  position:relative;overflow:hidden;transition:all .3s;
  box-shadow:0 0 15px rgba(220,20,60,.15);
}
.choice-btn::before{content:'蓮';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.2;color:var(--gold-accent);}
.choice-btn::after{content:'蓮';position:absolute;right:14px;top:50%;transform:translateY(-50%) scaleX(-1);font-size:13px;opacity:.2;color:var(--gold-accent);}
.choice-btn:active{box-shadow:0 0 30px rgba(220,20,60,.4),0 0 5px var(--green-neon);transform:scale(1.02);}

/* ====== [3] QUIZ - ENHANCED ====== */
#quiz-screen{
  background:
    radial-gradient(circle at 20% 30%,rgba(139,0,0,.15),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(57,255,20,.03),transparent 30%),
    radial-gradient(circle at 50% 50%,rgba(74,0,0,0.2),transparent 60%),
    var(--black-main);
  justify-content:center;align-items:center;padding:20px;
}
.quiz-progress{position:absolute;top:20px;left:20px;right:20px;height:2px;background:rgba(255,255,255,.08);z-index:30;border-radius:2px;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--red-neon),var(--green-neon));transition:width .5s ease;box-shadow:0 0 8px var(--red-neon);border-radius:2px;}
.quiz-qnum{font-family:var(--font-cyber);font-size:10px;color:var(--green-neon);letter-spacing:5px;margin-bottom:24px;text-shadow:0 0 10px var(--green-neon);opacity:0.7;}
.quiz-question{font-family:var(--font-serif);font-size:18px;color:var(--white-cream);text-align:center;margin-bottom:32px;line-height:1.8;padding:0 10px;letter-spacing:1px;}

}

/* ====== CALENDAR ====== */
async function showCal(from,to){
  const ov=document.createElement('div');ov.className='calendar-overlay';ov.id='cal-tmp';
  if(from){
    ov.innerHTML=`<div class="calendar-page" id="cal-old">${from}日</div>`;
    document.body.appendChild(ov);
    const o=document.getElementById('cal-old');o.style.animation='calendarDrop 1s ease-in forwards';
    await sl(800);o.remove();
  } else { document.body.appendChild(ov); }
  const np=document.createElement('div');np.className='calendar-page';np.style.animation='fadeInUp .8s ease-out';
  np.innerHTML=to+'日';ov.appendChild(np);
  await sl(1500);ov.style.transition='opacity .5s';ov.style.opacity='0';await sl(500);ov.remove();
}

function startQuiz(){
  scores={nyeon:0,kubera:0,preta:0,asura:0,gyenang:0,alyu:0,ekek:0,tikbalang:0};
  curQ=0;showScr('quiz-screen');renderQ();

function renderQ(){
  const d=QUIZ[curQ];
  document.getElementById('quiz-progress-fill').style.width=((curQ)/QUIZ.length*100)+'%';
  document.getElementById('quiz-num').textContent=`Q${curQ+1} / ${QUIZ.length}`;
  document.getElementById('quiz-question').textContent=d.q;
  document.getElementById('quiz-question').style.opacity='1';
  document.getElementById('quiz-num').style.opacity='1';
  const oc=document.getElementById('quiz-options');oc.innerHTML='';

  d.opts.forEach((o,i)=>{
    const b=document.createElement('div');b.className='quiz-option';b.textContent=o.t;b.dataset.idx=i;
    b.addEventListener('click',()=>{
      if(b.classList.contains('vanished'))return;
      if(o.fake){b.classList.add('glitch-out');setTimeout(()=>b.classList.add('vanished'),500);return;}
      selectOpt(i,b);
    });
    oc.appendChild(b);
  });

  if(d.special){
    q9T=setTimeout(()=>{
      const opts=oc.querySelectorAll('.quiz-option');
      d.opts.forEach((o,i)=>{if(o.fake&&opts[i]){opts[i].classList.add('glitch-out');setTimeout(()=>opts[i].classList.add('vanished'),500);}});
    },1600);
  }
}

function selectOpt(idx,el){
  if(q9T){clearTimeout(q9T);q9T=null;}
  const d=QUIZ[curQ],o=d.opts[idx];
  for(let c in o.c)scores[c]=(scores[c]||0)+o.c[c];

  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='petal-particle';
    const a=(Math.PI*2/12)*i,dist=80+Math.random()*120;
    p.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(a)*dist}px;--ty:${Math.sin(a)*dist}px;--rot:${Math.random()*720}deg;background:${['#DC143C','#8B0000','#FF1744','#FFD700'][~~(Math.random()*4)]};`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1300);
  }

  el.style.animation='shatter .5s ease-out forwards';
  document.querySelectorAll('#quiz-options .quiz-option').forEach(x=>{if(x!==el&&!x.classList.contains('vanished')){x.style.transition='opacity .5s';x.style.opacity='0';}});
  document.getElementById('quiz-question').style.transition='opacity .5s';document.getElementById('quiz-question').style.opacity='0';
  document.getElementById('quiz-num').style.transition='opacity .5s';document.getElementById('quiz-num').style.opacity='0';

  setTimeout(()=>{curQ++;if(curQ>=QUIZ.length)showGacha();else renderQ();},700);
}

/* ====== [4] GACHA ====== */
function showGacha(){
  let mx='nyeon',ms=0;for(let c in scores)if(scores[c]>ms){ms=scores[c];mx=c;}
  const ch=CHARS.find(c=>c.id===mx);
  showScr('gacha-screen');
  const scr=document.getElementById('gacha-screen');
  scr.style.background='radial-gradient(circle,#1a0000 0%,#0a0a0a 60%,#000 100%)';

  // Clean up any previous scan lines
  scr.querySelectorAll('.gacha-scanline,.gacha-vline').forEach(e=>e.remove());

  // Spawn horizontal green scan lines
  for(let i=0;i<6;i++){
    const line=document.createElement('div');
    line.className='gacha-scanline';
    const startY=Math.random()*100;
    const dist=-200-Math.random()*400;
    line.style.cssText=`top:${startY}%;--spd:${1.5+Math.random()*2}s;--del:${0.3+i*0.4}s;--dist:${dist}px;`;
    scr.appendChild(line);
  }

  // Spawn vertical green accent lines
  for(let i=0;i<4;i++){
    const vl=document.createElement('div');
    vl.className='gacha-vline';
    const h=30+Math.random()*40;
    vl.style.cssText=`left:${10+Math.random()*80}%;top:${10+Math.random()*40}%;--spd:${1.2+Math.random()*1.5}s;--del:${0.5+i*0.5}s;--h:${h}vh;`;
    scr.appendChild(vl);
  }

  // Name slides in from right
  const nm=document.getElementById('gacha-name');nm.textContent=ch.name;
  nm.style.cssText='top:20%;left:50%;transform:translateX(100vw);opacity:0;';
  nm.style.animation='slideFromRight 1.5s ease-out forwards';

  // Standing slides from left to CENTER (not stuck at left)
  setTimeout(()=>{
    const st=document.getElementById('gacha-standing');st.src=ch.standing;
    st.style.cssText='opacity:0;left:50%;transform:translateX(-150%);';
    st.style.transition='transform 1.2s ease-out, opacity 0.8s ease-out';
    requestAnimationFrame(()=>{
      st.style.opacity='1';
      st.style.transform='translateX(-50%)';
    });
  },1000);

  // Chakra bloom
  setTimeout(()=>{
    document.getElementById('chakra1').style.animation='chakraBloom 2s ease-out forwards';
    document.getElementById('chakra2').style.animation='chakraBloom 2s ease-out .3s forwards';
  },1800);

  // Second wave of scan lines for extra drama
  setTimeout(()=>{
    for(let i=0;i<4;i++){
      const line=document.createElement('div');
      line.className='gacha-scanline';
      const startY=Math.random()*100;
      const dist=-150-Math.random()*300;
      line.style.cssText=`top:${startY}%;--spd:${1+Math.random()*1.5}s;--del:${i*0.3}s;--dist:${dist}px;`;
      scr.appendChild(line);
    }
  },2500);

  setTimeout(()=>openCharDet(ch.id),4500);
}

  CHARS.forEach((ch, index) => {
    const c = document.createElement('div');
    c.className = 'token-cell';
    c.onclick = () => openCharDet(ch.id);
    
    const tokenImgUrl = `${tokenBaseUrl}token${index + 1}.png`;

    c.innerHTML = `
      <div class="token-name">${ch.disp}</div>
      <div class="token-circle">

          width:100%;height:100%;object-fit:cover;border-radius:50%;position:relative;z-index:2;">
      </div>
      <div class="token-name-sub">${ch.sub}</div>`;
    
    g.appendChild(c);
  });
}

  const ia=document.getElementById('char-info-area');
  ia.innerHTML=`
    <div class="char-info-box"><h3>${ch.disp}</h3><div class="info-label">NAME</div><div class="info-value">${ch.name} / ${ch.sub}</div></div>
    <div class="char-info-box">
      <div class="info-label">GENDER</div><div class="info-value">${ch.info.gender}</div>
      <div class="info-label">AGE</div><div class="info-value">${ch.info.age}</div>
      <div class="info-label">HEIGHT</div><div class="info-value">${ch.info.height}</div>
      <div class="info-label">CLASS</div><div class="info-value">${ch.info.cls}</div>
      <div class="info-label">STYLE</div><div class="info-value">${ch.info.style}</div>
    </div>
    <div class="char-info-box"><div class="info-label">FEATURES</div><div class="info-value">${ch.info.feat}</div></div>
    <div class="char-info-box"><div class="info-label">TERRITORY</div><div class="info-value">${ch.info.region}</div>
      ${ch.info.regionImg?`<img class="region-thumb" src="${ch.info.regionImg}" alt="거주지역" onclick="event.stopPropagation();openFS('${ch.info.regionImg}')">`:
      `<div style="width:100%;height:120px;background:linear-gradient(135deg,#1a0000,#0a0a0a);border:1px dashed rgba(139,0,0,.3);display:flex;justify-content:center;align-items:center;color:rgba(245,230,211,.3);font-size:12px;margin-top:8px;">이미지 미등록</div>`}
    </div>`;
}
function closeCharDetail(){buildLib();showScr('library-screen');}

/* ====== FULLSCREEN ====== */
function openFS(s){document.getElementById('fullscreen-img').src=s;document.getElementById('fullscreen-overlay').classList.add('active');}
function closeFullscreen(){document.getElementById('fullscreen-overlay').classList.remove('active');}

/* ====== MUSIC ====== */
function toggleMusic(){
  const b=document.getElementById('bgm'),t=document.getElementById('music-toggle'),bars=document.querySelectorAll('.music-bar-line');
  if(musicOn){b.pause();musicOn=false;t.textContent='▶';bars.forEach(b=>b.style.animationPlayState='paused');}
  else{b.play().catch(()=>{});musicOn=true;t.textContent='⏸';bars.forEach(b=>b.style.animationPlayState='running');}
}

buildLib();
</script>
</body>
</html>
